apiVersion: apps/v1
kind: Deployment
metadata:
  name: increment-visitor-counter
  namespace: default
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: increment-visitor-counter
  template:
    metadata:
      labels:
        app: increment-visitor-counter
    spec:
      terminationGracePeriodSeconds: 10
      containers:
      - name: counter-api
        image: asia-southeast1-docker.pkg.dev/gcp-serverless-portfolio/gcp-serverless-portfolio/portfolio-backend:latest
        ports:
        - containerPort: 8080
        # Injected environment configurations
        env:
        - name: FUNCTION_TARGET
          value: "increment_visitor_counter"
        - name: GCP_PROJECT
          value: "gcp-serverless-portfolio"
        - name: GOOGLE_CLOUD_PROJECT
          value: "gcp-serverless-portfolio"
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 20
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: increment-visitor-counter-service
  namespace: default
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: increment-visitor-counter
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-backend
  namespace: default
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: portfolio-backend
  template:
    metadata:
      labels:
        app: portfolio-backend
    spec:
      terminationGracePeriodSeconds: 10
      containers:
      - name: backend-api
        image: asia-southeast1-docker.pkg.dev/gcp-serverless-portfolio/gcp-serverless-portfolio/portfolio-backend:latest
        ports:
        - containerPort: 8080
        # Injected environment configurations
        env:
        - name: GCP_PROJECT
          value: "gcp-serverless-portfolio"
        - name: GOOGLE_CLOUD_PROJECT
          value: "gcp-serverless-portfolio"
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 20
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: portfolio-backend-service
  namespace: default
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: 8080
  selector:
    app: portfolio-backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-frontend
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: portfolio-frontend
  template:
    metadata:
      labels:
        app: portfolio-frontend
    spec:
      terminationGracePeriodSeconds: 10
      containers:
      - name: frontend-ui
        image: asia-southeast1-docker.pkg.dev/gcp-serverless-portfolio/gcp-serverless-portfolio/portfolio-frontend:latest
        ports:
        - containerPort: 8080
        # Keep HTTP check for Nginx since it serves a clean / index page!
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 45
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: portfolio-frontend-service
  namespace: default
spec:
  type: NodePort #changed from LoadBalancer to prevent Ingress routing
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: portfolio-frontend
