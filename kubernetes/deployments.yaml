---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-frontend
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: portfolio-frontend
  template:
    metadata:
      labels:
        app: portfolio-frontend
    spec:
      terminationGracePeriodSeconds: 10
      containers:
      - name: frontend-ui
        image: asia-southeast1-docker.pkg.dev/gcp-serverless-portfolio/gcp-serverless-portfolio/portfolio-frontend:latest
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 45
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: portfolio-frontend-service
  namespace: default
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: portfolio-frontend

