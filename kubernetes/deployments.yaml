apiVersion: apps/v1
kind: Deployment
metadata:
  name: increment-visitor-counter
  namespace: default
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: increment-visitor-counter
  template:
    metadata:
      labels:
        app: increment-visitor-counter
      # 🌟 ADDED PROMETHEUS SCRAPE ANNOTATIONS HERE
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8080"
    spec:
      terminationGracePeriodSeconds: 10
      containers:
      - name: counter-api
        image: asia-southeast1-docker.pkg.dev/gcp-serverless-portfolio/gcp-serverless-portfolio/portfolio-backend:latest
        ports:
        - containerPort: 8080
        env:
        - name: FUNCTION_TARGET
          value: "increment_visitor_counter"
        - name: GCP_PROJECT
          value: "gcp-serverless-portfolio"
        - name: GOOGLE_CLOUD_PROJECT
          value: "gcp-serverless-portfolio"
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: "/var/secrets/google/credentials.json"
        volumeMounts:
        - name: sa-key-volume
          mountPath: /var/secrets/google
          readOnly: true
        livenessProbe:
          httpGet:
            path: /metrics # 🌟 Hits your clean Prometheus metrics endpoint
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /metrics # 🌟 Hits your clean Prometheus metrics endpoint
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
      volumes: # Aligned perfectly as a peer of containers
      - name: sa-key-volume
        secret:
          secretName: firestore-sa-key
---
apiVersion: v1
kind: Service
metadata:
  name: increment-visitor-counter-service
  namespace: default
  labels:
    app: increment-visitor-counter # Added label for easier tracking
spec:
  type: ClusterIP
  ports:
  - name: http         # 🌟 Google Load Balancer hits this on port 80
    port: 80
    targetPort: 8080   # Forwards to your container's port 8080
  - name: http-metrics # 🌟 Added this line
    port: 8080
    targetPort: 8080
  selector:
    app: increment-visitor-counter
---
