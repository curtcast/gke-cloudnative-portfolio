name: Deploy Multi-Service App to Cloud Run

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
  PROJECT_ID: gcp-serverless-portfolio      # 🔴 Replace this
  REGION: asia-southeast1                   # 🔴 Replace this
  REPO_NAME: gcp-serverless-portfolio            # 🔴 Replace this
    # 🟢 FIX 1: Opt-in to the new Node.js runtime to clear the warning
  

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    # 🟢 NEW ELEMENT: Set up Python Environment on the runner
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 🟢 NEW ELEMENT: Install dependencies and execute test files
    - name: Run Backend Unit Tests
      run: |
        cd backend
        pip install -r requirements.txt
        python -m unittest test_main.py

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v3
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v3

    - name: Configure Docker
      run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

    # --- BACKEND DEPLOYMENT ---
    - name: Build & Push Backend Image
      run: |
        BACKEND_TAG=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/portfolio-backend:${{ github.sha }}
        docker build -t $BACKEND_TAG ./backend
        docker push $BACKEND_TAG
        echo "BACKEND_TAG=$BACKEND_TAG" >> $GITHUB_ENV

    - name: Deploy Backend to Cloud Run
      uses: google-github-actions/deploy-cloudrun@v3
      with:
        service: portfolio-backend
        region: ${{ env.REGION }}
        image: ${{ env.BACKEND_TAG }}
          # 🌟 FORCE FUNCTIONS CONFIGURATION IN CLOUD RUN
        env_vars: |
          FUNCTION_TARGET=increment_visitor_counter

    # --- FRONTEND DEPLOYMENT ---
    - name: Build & Push Frontend Image
      run: |
        FRONTEND_TAG=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/portfolio-frontend:${{ github.sha }}
        docker build -t $FRONTEND_TAG ./frontend
        docker push $FRONTEND_TAG
        echo "FRONTEND_TAG=$FRONTEND_TAG" >> $GITHUB_ENV

    - name: Deploy Frontend to Cloud Run
      uses: google-github-actions/deploy-cloudrun@v3
      with:
        service: portfolio-frontend
        region: ${{ env.REGION }}
        image: ${{ env.FRONTEND_TAG }}
        revision_traffic: 'LATEST=100'

    # ==========================================
    # ☸️ GKE DEPLOYMENT LAYER
    # ==========================================
    - name: Connect to GKE Cluster
      uses: google-github-actions/get-gke-credentials@v2
      with:
        cluster_name: 'portfolio-cluster'
        location: '${{ env.REGION }}'
        project_id: '${{ env.PROJECT_ID }}'

    # Dynamically injects the unique commit SHA tag right before applying the template
    - name: Prerender Kubernetes Manifest Tags
      run: |
        sed -i "s|portfolio-frontend:latest|portfolio-frontend:${{ github.sha }}|g" kubernetes/deployments.yaml
        sed -i "s|portfolio-backend:latest|portfolio-backend:${{ github.sha }}|g" kubernetes/deployments.yaml

    - name: Deploy Manifests to GKE Cluster
      run: |
        kubectl apply -f kubernetes/deployments.yaml

    - name: Verify Live Rollout Statuses
      run: |
        kubectl rollout status deployment/portfolio-frontend --timeout=300s
        kubectl rollout status deployment/portfolio-backend --timeout=300s
        kubectl rollout status deployment/increment-visitor-counter --timeout=300s

    - name: Deploy Manifests to GKE Cluster
      run: |
        kubectl apply -f kubernetes/deployments.yaml
        kubectl apply -f kubernetes/ingress.yaml # Appended here
