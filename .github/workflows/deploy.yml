name: Deploy Multi-Service App to GKE via Terraform IaC

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 
  PROJECT_ID: gcp-serverless-portfolio      
  REGION: asia-southeast1                   
  REPO_NAME: gcp-serverless-portfolio            

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    # 1. Set up Python Environment on the runner
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    # 2. Install dependencies and execute test files
    - name: Run Backend Unit Tests
      run: |
        cd backend
        pip install -r requirements.txt
        python -m unittest test_main.py

    # 3. Authenticate securely to Google Cloud Platform
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v3
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    # 4. Set up Google Cloud CLI tool handles
    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v3

    # ==========================================
    # ☸️ GKE CLUSTER CREDENTIALS LAYER (MOVED UP)
    # ==========================================
    # 🌟 This must happen BEFORE Terraform so the Helm provider can authenticate
     Sir, name: Connect to GKE Cluster
      uses: google-github-actions/get-gke-credentials@v3
      with:
        cluster_name: 'portfolio-cluster'
        location: '${{ env.REGION }}'
        project_id: '${{ env.PROJECT_ID }}'

    # 🌟 Create the Grafana secret in GKE so the Terraform Helm chart can read it immediately
    - name: Create Grafana Cloud Credentials Secret
      run: |
        kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -
        kubectl create secret generic grafana-cloud-credentials \
          -n monitoring \
          --from-literal=username="3323108" \
          --from-literal=password="${{ secrets.GRAFANA_CLOUD_TOKEN }}" \
          --dry-run=client -o yaml | kubectl apply -f -

    # ==========================================
    # 🏗️ AUTOMATED TERRAFORM INFRASTRUCTURE LAYER
    # ==========================================
    - name: Setup Terraform IaC Engine
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: "1.7.0"

    - name: Run Terraform Initialization & Verification
      run: |
        cd terraform
        terraform init
        terraform apply -auto-approve

    # ==========================================
    # 📦 DOCKER CONTAINER IMAGES LAYER
    # ==========================================
    - name: Configure Docker
      run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

    - name: Build & Push Backend Image
      run: |
        BACKEND_TAG=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/portfolio-backend:${{ github.sha }}
        docker build -t $BACKEND_TAG ./backend
        docker push $BACKEND_TAG
        echo "BACKEND_TAG=$BACKEND_TAG" >> $GITHUB_ENV

    - name: Build & Push Frontend Image
      run: |
        FRONTEND_TAG=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/portfolio-frontend:${{ github.sha }}
        docker build -t $FRONTEND_TAG ./frontend
        docker push $FRONTEND_TAG
        echo "FRONTEND_TAG=$FRONTEND_TAG" >> $GITHUB_ENV

    # ==========================================
    # ☸️ GKE CLUSTER DEPLOYMENT LAYER
    # ==========================================
    # Dynamically injects the unique commit SHA tag right before applying the template
    - name: Prerender Kubernetes Manifest Tags
      run: |
        sed -i "s|portfolio-frontend:latest|portfolio-frontend:${{ github.sha }}|g" kubernetes/deployments.yaml
        sed -i "s|portfolio-backend:latest|portfolio-backend:${{ github.sha }}|g" kubernetes/deployments.yaml

    # Creates a secure key vault entry inside your cluster so Python can authenticate with Firestore
    - name: Create GKE Database Authentication Secret
      run: |
        kubectl create secret generic firestore-sa-key \
          --from-literal=credentials.json='${{ secrets.GCP_SA_KEY }}' \
          --dry-run=client -o yaml | kubectl apply -f -

    - name: Deploy Manifests to GKE Cluster
      run: |
        kubectl apply -f kubernetes/deployments.yaml

    - name: Verify Live Rollout Statuses
      run: |
        echo "=== Launching Parallel Rollout Verification ==="
        
        # 1. Trigger the checks in the background (using the '&' operator)
        kubectl rollout status deployment/portfolio-frontend --timeout=180s &
        PID_FRONTEND=$!
        
        kubectl rollout status deployment/portfolio-backend --timeout=180s &
        PID_BACKEND=$!
        
        kubectl rollout status deployment/increment-visitor-counter --timeout=180s &
        PID_COUNTER=$!
        
        # 2. Wait for all background checks to finish
        wait $PID_FRONTEND
        STATUS_FRONTEND=$?
        
        wait $PID_BACKEND
        STATUS_BACKEND=$?
        
        wait $PID_COUNTER
        STATUS_COUNTER=$?
        
        # 3. Evaluate results
        if [ $STATUS_FRONTEND -ne 0 ] || [ $STATUS_BACKEND -ne 0 ] || [ $STATUS_COUNTER -ne 0 ]; then
          echo "❌ One or more deployments failed to roll out within the window."
          exit 1
        fi
        
        echo "✅ All microservices rolled out and reached a healthy state successfully!"
