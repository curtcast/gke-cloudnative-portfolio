<!DOCTYPE html>
<html lang="en">
<head>

    <title>404 - Page Not Found</title>
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white flex flex-col items-center justify-center min-h-screen p-6">
